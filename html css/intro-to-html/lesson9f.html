<!DOCTYPE html>
<html>
  <head>
    <style>
      p {
        margin-top: 0px;
        margin-bottom: 5px;
        margin-left: 5px;
      }
      div {
        display: inline-block;
        border-color: rgb(190, 186, 186);
        box-shadow: 3px 3px 8px rgba(0, 0, 0, 0.3);
        padding-top: 0px;
        padding-right: 0px;
        padding-left: 0px;
        padding-bottom: 0px;
        border-radius: 5px;
        border-width: 1px;
        border-style: solid;
      }
      img {
        height: 120px;
        width: 120px;
        object-fit: cover;
      }
      .name {
        font-size: 20px;
        font-weight: 500;
      }
      .friends {
        font-size: 15px;
        color: grey;
      }
      button {
        font-size: 10px;
        background-color: rgb(12, 127, 250);
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 15px;
        padding-left: 15px;
        border-radius: 5px;
        border: none;
        text-align: center;
        margin-bottom: 10px;
        margin-left: 6px;
      }
    </style>
  </head>
  <body>
    <div>
      <img src="cat-pic.webp" />
      <p class="name">Flink</p>
      <p class="friends">2 mutualFriends</p>
      <button>Add Friend</button>
    </div>
  </body>
</html>
