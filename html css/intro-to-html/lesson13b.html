<!DOCTYPE html>
<html>
  <head>
    <style>
      .flexbox {
        display: flex;
        flex-direction: row;
        height: 50px;
      }
      .column-1 {
        background-color: lightpink;
        width: 100px;
      }

      .column-2 {
        background-color: lightblue;
        width: 200px;
      }
      .row1 {
        background-color: lightblue;
        color: black;
      }
      .row2 {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
      }
      p {
        margin-top: 0;
        margin-bottom: 0;
        background-color: black;
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="flexbox">
      <div class="column-1"></div>
      <div class="column-2">
        <p class="row1">row1</p>
        <div class="row2">
          <p>row2</p>
          <p>row2</p>
        </div>
      </div>
    </div>
  </body>
</html>
