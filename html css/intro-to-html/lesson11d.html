<!DOCTYPE html>
<html>
  <head>
    <style>
      .main-container {
        display: grid;
        grid-template-columns: 170px 170px 170px;
        column-gap: 20px;
      }
      .sub-container {
        display: grid;
        grid-template-columns: 170px;
        border-color: rgb(231, 228, 228);
        border-style: solid;
        border-width: 1px;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.2);
      }

      .pfp {
        object-fit: cover;
        width: 100%;
        height: 150px;
      }
      .info-container {
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 4px;
        padding-left: 8px;
        padding-bottom: 8px;
        padding-top: 10px;
      }
      p {
        margin-top: 0px;
        margin-bottom: 0px;
        font-family: arial;
      }
      .name {
        font-weight: bold;
        font-size: 20px;
        color: black;
      }
      .sub-info-container {
        display: grid;
        grid-template-columns: 30px 1fr;

        column-gap: 5px;
      }

      .friend-pfp {
        object-fit: cover;
        width: 100%;
        height: 30px;
        border-radius: 25px;
      }
      .mutual-friends {
        color: grey;
        margin-top: 8px;
      }

      button {
        padding: 8px 12px 8px 12px;
        color: white;
        background-color: rgb(27, 119, 248);
        border: none;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="sub-container">
        <img class="pfp" src="cat-pic.webp" />
        <div class="info-container">
          <p class="name">Oliver</p>
          <div class="sub-info-container">
            <img class="friend-pfp" src="cat-image2.webp" />
            <p class="mutual-friends">2 mutual friends</p>
          </div>
          <div>
            <button>Add friends</button>
          </div>
        </div>
      </div>

      <div class="sub-container">
        <img class="pfp" src="cat-image3.webp" />
        <div class="info-container">
          <p class="name">Mimi</p>
          <div class="sub-info-container">
            <img class="friend-pfp" src="cat-pic.webp" />
            <p class="mutual-friends">2 mutual friends</p>
          </div>
          <div>
            <button>Add friends</button>
          </div>
        </div>
      </div>

      <div class="sub-container">
        <img class="pfp" src="cat-image2.webp" />
        <div class="info-container">
          <p class="name">Rex</p>
          <div class="sub-info-container">
            <img class="friend-pfp" src="cat-image3.webp" />
            <p class="mutual-friends">2 mutual friends</p>
          </div>
          <div>
            <button>Add friends</button>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
