<!DOCTYPE html>
<html>
  <head>
    <style>
      .main-container {
        display: grid;
        grid-template-columns: 300px;
        width: 300px;
        row-gap: 20px;
      }
      .sub-container {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      img {
        width: 50px;
        height: 50px;
        border-radius: 25px;
        object-fit: cover;
        background-color: lightblue;
      }
      .info-container {
        width: 170px;
        display: grid;
        grid-template-columns: 1fr;
        row-gap: 3px;
      }
      p {
        margin-top: 0px;
        margin-bottom: 0px;
        font-family: arial;
        color: grey;
        font-size: 12px;
      }
      .name {
        color: black;
        font-weight: bold;
        font-size: 15px;
      }
      button {
        padding-top: 8px;
        padding-bottom: 8px;
        padding-right: 10px;
        padding-left: 10px;
        background-color: rgb(33, 120, 250);
        color: white;
        border: none;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <div class="sub-container">
        <img src="cat-image2.webp" />
        <div class="info-container">
          <p class="name">Oliver</p>
          <p>the cat</p>
          <p>popular</p>
        </div>
        <button>Follow</button>
      </div>

      <div class="sub-container">
        <img src="cat-image3.webp" />
        <div class="info-container">
          <p class="name">Mimi</p>
          <p>the cat</p>
          <p>popular</p>
        </div>
        <button>Follow</button>
      </div>

      <div class="sub-container">
        <img src="cat-pic.webp" />
        <div class="info-container">
          <p class="name">Rex</p>
          <p>the cat</p>
          <p>popular</p>
        </div>
        <button>Follow</button>
      </div>
    </div>
  </body>
</html>
