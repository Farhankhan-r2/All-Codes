<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        height: 3000px;
      }
      .thumbnail {
        height: 180px;
        width: 370px;
        background-color: grey;
        position: relative;
        position: absolute;
        bottom: 20px;
        right: 10px;
      }
      .close {
        font-family: arial;
        padding: 5px 10px 5px 10px;
        position: absolute;
        top: -8px;
        left: -8px;
        color: white;
        background-color: black;
        border-radius: 15px;
      }
      .timing {
        font-family: Arial, Helvetica, sans-serif;
        background-color: black;
        color: white;
        padding-top: 2px;
        padding-right: 5px;
        padding-bottom: 2px;
        padding-left: 5px;
        position: absolute;
        bottom: 10px;
        right: 8px;
      }
    </style>
  </head>
  <body>
    <div class="thumbnail">
      <div class="close">x</div>
      <div class="timing">0.29</div>
    </div>
  </body>
</html>
