<!DOCTYPE html>
<html>
  <head>
    <style>
      div {
        display: inline-block;
      }
      .main-container {
        width: 130px;
        height: 200px;
        border-color: rgb(224, 224, 224);
        border-style: solid;
        border-width: 1px;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.1);
        margin-right: 5px;
      }
      .pfp-container {
        width: 130px;
        height: 110px;
      }
      img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
      }
      .info-container {
        margin-left: 8px;
      }
      .mutual-friends {
        margin-top: 5px;
      }
      .name {
        font-size: 15px;
        font-weight: 500;
        color: black;
        margin-top: 5px;
      }
      p {
        font-family: arial;
        font-size: 12px;
        color: grey;
        display: inline-block;
        margin-top: 0px;
        margin-bottom: 0px;
        margin-top: 3px;
      }
      .friends-pfp-container {
        width: 20px;
        height: 20px;
        display: inline-block;
        vertical-align: top;
      }
      .friends-pfp {
        height: 100%;
        width: 100%;
        border-radius: 10px;
      }

      button {
        padding: 5px 10px 5px 10px;
        font-size: 13px;
        border: none;
        border-radius: 5px;
        background-color: rgb(16, 123, 253);
        color: white;
        display: block;
        margin-top: 8px;
        margin-left: 5px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="main-container">
        <div class="pfp-container">
          <img src="cat-pic.webp" />
        </div>
        <div class="info-container">
          <p class="name">Oliver</p>
          <div class="mutual-friends">
            <div class="friends-pfp-container">
              <img class="friends-pfp" src="cat-image2.webp" />
            </div>
            <p>2 mutual friends</p>
          </div>
        </div>
        <button>Add friend</button>
      </div>

      <div class="main-container">
        <div class="pfp-container">
          <img src="cat-image2.webp" />
        </div>
        <div class="info-container">
          <p class="name">Mimi</p>
          <div class="mutual-friends">
            <div class="friends-pfp-container">
              <img class="friends-pfp" src="cat-image3.webp" />
            </div>
            <p>2 mutual friends</p>
          </div>
        </div>
        <button>Add friend</button>
      </div>

      <div class="main-container">
        <div class="pfp-container">
          <img src="cat-image3.webp" />
        </div>
        <div class="info-container">
          <p class="name">Rex</p>
          <div class="mutual-friends">
            <div class="friends-pfp-container">
              <img class="friends-pfp" src="cat-pic.webp" />
            </div>
            <p>1 mutual friends</p>
          </div>
        </div>
        <button>Add friend</button>
      </div>
    </div>
  </body>
</html>
