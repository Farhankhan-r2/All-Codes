<!DOCTYPE html>
<html>
  <head>
    <style>
      div {
        background-color: rgb(50, 49, 49);
        display: inline-block;
        padding-left: 20px;
        padding-right: 20px;
        padding-top: 20px;
        padding-bottom: 10px;
        width: 360px;
        cursor: pointer;
      }
      p {
        margin-top: 5px;
        margin-bottom: 10px;
      }
      .title {
        color: white;
        font-size: 30px;
        font-weight: bold;
      }
      .sub-title {
        font-size: 20px;
        color: rgb(144, 143, 143);
      }
    </style>
  </head>
  <body>
    <div>
      <p class="title">Install YouTube Music</p>
      <p class="sub-title">
        Add YouTube to your desktop for quick and easy access
      </p>
    </div>
  </body>
</html>
