<!DOCTYPE html>
<html>
  <head>
    <title>Oliver the Cat</title>
    <style>
      .image-container {
        display: inline-block;
        width: 60px;

        border-radius: 35px;
        vertical-align: top;
      }
      img {
        width: 100%;
        border-radius: 50px;
        object-fit: cover;
      }
      .info-container {
        display: inline-block;
        width: 100px;
        margin-left: 20px;
      }
      p {
        margin-top: 0px;
        margin-bottom: 0px;
        color: grey;
        font-size: 20px;
      }
      .name {
        color: black;
        font-weight: bold;
      }
      button {
        padding-top: 8px;
        padding-bottom: 8px;
        padding-left: 5px;
        padding-right: 5px;
        color: white;
        font-size: 15px;
        font-weight: bold;
        border: none;
        border-radius: 5px;
        background-color: rgb(60, 132, 233);
        vertical-align: center;
      }
      .button-container {
        display: inline-block;
        vertical-align: top;
        margin-top: 20px;
        margin-left: 100px;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="image-container">
        <img src="cat-image2.webp" />
      </div>
      <div class="info-container">
        <p class="name">oliver</p>
        <p>the cat</p>
        <p>popular</p>
      </div>
      <div class="button-container">
        <button>Follow</button>
      </div>
    </div>
  </body>
</html>
