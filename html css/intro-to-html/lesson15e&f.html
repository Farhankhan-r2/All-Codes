<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        height: 3000px;
      }
      .image-container {
        position: relative;
        display: inline-block;
      }
      .discount {
        position: absolute;
        top: 20px;
        right: 0;
        background-color: black;
        color: white;
        padding-top: 12px;
        padding-bottom: 12px;
        padding-right: 8px;
        padding-left: 8px;
        border-radius: 3px;
        font-family: arial;
      }
      img {
        object-fit: cover;
        border-radius: 8px;
        height: 300px;
        width: 300px;
        cursor: pointer;
      }
      .addtocart {
        opacity: 0;
        position: absolute;
        bottom: 0;
        right: 0;
        left: 0;
        height: 100px;
      }
      .addtocart:hover {
        opacity: 1;
        transition: opacity 0.15s;
        font-family: arial;

        background-color: rgba(255, 255, 255, 0.8);
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
      }
      button {
        font-family: arial;
        border-radius: 2px;
        border-style: solid;
        border-radius: 3px;
        border-color: rgb(86, 85, 85);
        background-color: white;
        color: rgb(92, 92, 92);
        padding-top: 5px;
        padding-bottom: 5px;
        padding-right: 10px;
        padding-left: 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="image-container">
      <img src="jacket.jpg" />
      <div class="discount">20% OFF</div>
      <div class="addtocart">
        <button>Add to Cart</button>
      </div>
    </div>
  </body>
</html>
