<!DOCTYPE html>
<html>
  <head>
    <style>
      .right-slidebar {
        background-color: green;
        color: white;
        position: fixed;
        right: 0;
        top: 0;
        bottom: 0;
        width: 100px;
      }
      .popup-message {
        position: fixed;
        top: 0px;
        bottom: 0px;
        right: 0px;
        left: 0px;
        background-color: rgba(0, 0, 0, 0.8);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .message {
        background-color: white;
        padding-right: 100px;
        padding-left: 100px;
        padding-top: 30px;
        padding-bottom: 30px;
        border-radius: 15px;
      }
      p {
        font-size: 30px;
        margin: 0;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <div class="right-slidebar">right slidebar</div>
    <div class="popup-message">
      <div class="message">
        <p><strong class="title"> Model Title </strong></p>
        <p>This is a model</p>
        <button>close</button>
      </div>
    </div>
  </body>
</html>
