<!DOCTYPE html>
<html>
  <head>
    <style>
      .main-container {
        background-color: rgb(147, 68, 211);
        border: none;
        padding: 8px;
        display: flex;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
      }
      .home-button {
        background-color: rgb(147, 68, 211);
        color: white;
        font-family: arial;
        border: none;
        padding: 8px 5px 8px 5px;
      }
      input {
        width: 400px;
        height: 25px;
        color: grey;
        border-radius: 25px;
        border: none;
        padding-left: 10px;
      }
      .download-button {
        background-color: rgb(147, 68, 211);
        border-color: rgb(193, 190, 190);
        color: rgb(193, 190, 190);
        border-style: solid;
        border-width: 1px;
        padding: 8px 5px 8px 5px;
      }
    </style>
  </head>
  <body>
    <div class="main-container">
      <button class="home-button">Home</button>
      <input type="text" placeholder="Search" />
      <button class="download-button">Download</button>
    </div>
  </body>
</html>
