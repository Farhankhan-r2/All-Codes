<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        height: 3000px;
      }
      .slidebar-1 {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 0;
        width: 70px;
        background-color: rgb(33, 33, 33);
      }
      img {
        object-fit: cover;
        height: 50px;
        width: 50px;
        border-radius: 25px;
        margin-left: 5px;
        margin-top: 5px;
      }
      .slidebar-2 {
        position: fixed;
        top: 0;
        bottom: 0;
        left: 70px;
        width: 200px;
        background-color: rgb(55, 55, 55);
        padding-left: 8px;
        padding-right: 8px;
      }
      p {
        margin-top: 10px;
        margin-bottom: 0px;
        font-family: arial;
        font-size: 20px;
        color: grey;
      }
      .title {
        display: flex;
        flex-direction: row;
        justify-content: space-between;
      }
      .info {
        color: white;
      }
    </style>
  </head>
  <body>
    <div class="slidebar-1">
      <img src="cat-image2.webp" />
      <img src="cat-image3.webp" />
      <img src="cat-pic.webp" />
    </div>
    <div class="slidebar-2">
      <div class="title">
        <p class="info">INFO</p>
        <p><strong>&#43;</strong></p>
      </div>
      <p># new-videos</p>
      <p># updates</p>
      <p># faq</p>
    </div>
  </body>
</html>
