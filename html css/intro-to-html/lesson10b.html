<!DOCTYPE html>
<html>
  <head>
    <style>
      .image-container {
        width: 40px;
        height: 40px;
        vertical-align: top;
      }
      img {
        object-fit: cover;
        width: 100%;
        height: 100%;

        display: block;

        border-radius: 20px;
      }
      div {
        display: inline-block;
      }

      .main-container {
        display: block;
        margin-top: 10px;
      }
      p {
        margin-top: 0px;
        margin-bottom: 0px;
        margin-left: 10px;
        font-family: arial;
        color: rgb(146, 143, 143);
        font-size: 12px;
      }
      .info-container {
        width: 100px;
      }
      .name {
        font-size: 15px;
        font-weight: bold;
        color: black;
      }

      .button-container {
        vertical-align: top;
        margin-top: 8px;
      }
      button {
        padding-left: 10px;
        padding-right: 10px;
        padding-bottom: 5px;
        padding-top: 5px;
        font-size: 15px;
        color: whitesmoke;
        background-color: rgb(20, 117, 252);
        border: none;
        border-radius: 5px;
        margin-left: 200px;
        cursor: pointer;
        display: block;
      }
    </style>
  </head>
  <body>
    <div>
      <div class="main-container">
        <div class="image-container">
          <img src="cat-pic.webp" />
        </div>
        <div class="info-container">
          <p class="name">oliver</p>
          <p>the cat</p>
          <p>Popular</p>
        </div>
        <div class="button-container">
          <button>Follow</button>
        </div>
      </div>

      <div class="main-container">
        <div class="image-container">
          <img src="cat-image3.webp" />
        </div>
        <div class="info-container">
          <p class="name">Mimi</p>
          <p>smart cat</p>
          <p>Popular</p>
        </div>
        <div class="button-container">
          <button>Follow</button>
        </div>
      </div>

      <div class="main-container">
        <div class="image-container">
          <img src="cat-image2.webp" />
        </div>
        <div class="info-container">
          <p class="name">Rex</p>
          <p>lazy cat</p>
          <p>Popular</p>
        </div>
        <div class="button-container">
          <button>Follow</button>
        </div>
      </div>
    </div>
  </body>
</html>
