    <script>
      /*
       1. Creating the Object (Quotes are Optional-ish)
           When you are first creating an object (the part inside the curly braces {}), you are defining "keys."

           Normal Keys: If the name is a simple word with no spaces or special characters, you don't need quotes.

           wins: 0 is the same as 'wins': 0.

           Special Keys: If the name has a hyphen or a space, you must use quotes so JavaScript doesn't get confused.

           Example: 'delivery-time': '3 days'.
       */

       product.name = "cotton socks";
       console.log(product);
       
      const product2 = {

        // we only have string between the brackets so the brackets are optional so i removed it.

       console.log(product2);

      console.log("hello".length);
      console.log("hello".toUpperCase());

      const object1 = {
        message: "hellow",
      };
      const object2 = object1;

      object1.message = "Good job!";
      console.log(object1);
      console.log(object2);

      const object3 = {
        message: "Good job!",
      };
      console.log(object2 === object3);
      console.log(object2 === object1);

      //destructuring

      const object4 = {
        message: "Good job!",
        price: 799,
      };
      //const message = object4.message;
      const { message, price } = object4;
      console.log(message);
      console.log(price);

      //shorthand method

        method() {
