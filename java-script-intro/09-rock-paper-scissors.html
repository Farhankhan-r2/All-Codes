<!doctype html>
<html>

<head>
  <title>Rock paper scissors game</title>
</head>

<body>
  <header>Rock Paper Scissors</header>
  <button class="Rock" onclick="winOrlose('Rock')">Rock</button>
  <button class="Paper" onclick="winOrlose('Paper')">Paper</button>
  <button class="Scissors" onclick="winOrlose('Scissors')">Scissors</button>
  <button class="reset-button" onclick="
        record.wins = 0;
        record.loses = 0;
        record.ties = 0;
        localStorage.removeItem('record');
        updateScoreElement();
      ">
    Reset score
  </button>
  <p class="js-result"></p>
  <p class="js-moves"></p>
  <p class="js-score"></p>

  <script>
    let record = JSON.parse(localStorage.getItem("record")) || {
      wins: 0,
      loses: 0,
      ties: 0,
    };

    updateScoreElement();
    function updateScoreElement() {
      document.querySelector(".js-score").innerHTML =
        `wins:${record.wins}  loses:${record.loses}  ties:${record.ties}`;
    }

    function pickComputerMove() {
      const randomNumber = Math.random();
      let computerMove = "";
      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerMove = "Rock";
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = "Paper";
      } else if (randomNumber >= 2 / 3 && randomNumber <= 1) {
        computerMove = "Scissors";
      }
      return computerMove;
    }

    function winOrlose(userMove) {
      const computerMove = pickComputerMove();

      let result = "";
      if (userMove === "Rock") {
        if (computerMove === "Rock") {
          result = "TIE";
        } else if (computerMove === "Paper") {
          result = "YOU-LOSE";
        } else if (computerMove === "Scissors") {
          result = "YOU-WIN";
        }
      } else if (userMove === "Paper") {
        if (computerMove === "Rock") {
          result = "YOU-WIN";
        } else if (computerMove === "Paper") {
          result = "TIE";
        } else if (computerMove === "Scissors") {
          result = "YOU-LOSE";
        }
      } else if (userMove === "Scissors") {
        if (computerMove === "Rock") {
          result = "YOU-LOSE";
        } else if (computerMove === "Paper") {
          result = "YOU-WIN";
        } else if (computerMove === "Scissors") {
          result = "TIE";
        }
      }
      if (result === "YOU-WIN") {
        record.wins++;
      } else if (result === "YOU-LOSE") {
        record.loses++;
      } else if (result === "TIE") {
        record.ties++;
      }
      localStorage.setItem("record", JSON.stringify(record));


      updateScoreElement();

      document.querySelector(".js-moves").innerHTML =
        `computer move : ${computerMove} || Your move : ${userMove}`;
      document.querySelector(".js-result").innerHTML = `${result}`;
    }
    document.querySelector('Rock').onclick = winOrlose('Rock');
    document.querySelector('Paper').onclick = winOrlose('Paper');
    document.querySelector('Scissors').onclick = winOrlose('Scissors');
  </script>
</body>

</html>
