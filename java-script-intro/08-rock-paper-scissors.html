<!DOCTYPE html>
<html>

<head> </head>

<body>
  <p>Rock Paper Scissors</p>
  <button onclick="
     play('Rock');
    ">
    Rock
  </button>
  <button onclick="
     play('Paper');
    ">
    Paper
  </button>
  <button onclick="
     play('Scissors');
    ">
    Scissors
  </button>
  <button onclick="
       score.wins = 0;
       score.loses = 0;
       score.ties = 0;
       localStorage.removeItem('score');

    ">
    Reset Score
  </button>

  <script>
    // or i can write if(score ===  null ) since null is a falsy value both conditions are true
    let score = JSON.parse(localStorage.getItem("score")) || {
      wins: 0,
      loses: 0,
      ties: 0,
    };
    /*                                                     
    if (!score) {
      score = {
        wins: 0,
        loses: 0,
        ties: 0,
      };
    }
      */

    function pickComputerMove() {
      const randomNumber = Math.random();
      let computerMove = "";
      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerMove = "Rock";
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = "Paper";
      } else if (randomNumber >= 2 / 3 && randomNumber <= 1) {
        computerMove = "Scissors";
      }
      return computerMove;
    }

    function play(userMove) {
      const computerMove = pickComputerMove();
      let result = "";
      if (userMove === "Rock") {
        if (computerMove === "Rock") {
          result = "TIE";
        } else if (computerMove === "Paper") {
          result = "YOU LOSE";
        } else if (computerMove === "Scissors") {
          result = "YOU WIN";
        }
      } else if (userMove === "Paper") {
        if (computerMove === "Rock") {
          result = "YOU WIN";
        } else if (computerMove === "Paper") {
          result = "TIE";
        } else if (computerMove === "Scissors") {
          result = "YOU LOSE";
        }
      } else if (userMove === "Scissors") {
        if (computerMove === "Rock") {
          result = "YOU LOSE";
        } else if (computerMove === "Paper") {
          result = "YOU WIN";
        } else if (computerMove === "Scissors") {
          result = "TIE";
        }
      }

      if (result === "YOU WIN") {
        score.wins += 1;
      } else if (result === "YOU LOSE") {
        score.loses += 1;
      } else if (result === "TIE") {
        score.ties += 1;
      }

      localStorage.setItem("score", JSON.stringify(score));

      alert(
        `You Picked ${userMove}.Computer Picked ${computerMove} \n ${result} \n Wins: ${score.wins}  Loses: ${score.loses}  Ties: ${score.ties}
          `
      );
    }
  </script>
</body>

</html>
