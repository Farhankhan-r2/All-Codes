<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      background-image: url('cork-texture.jpg');
      background-repeat: repeat;
      /* This tiles the image */
      background-size: 40px;
      /* Adjust this to make the grain larger or smaller */
      font-family: 'Comic Sans MS', cursive;
    }

    .notes-container p {
      margin: 5px;
    }

    main {
      display: flex;
      justify-content: center;
      border: 2px solid black;
    }

    .outer-container {
      border: 2px solid grey;
      position: relative;
      padding: 40px;
    }

    .emoji-1-container {
      z-index: 100;
      transform: rotate(-2deg);
      position: absolute;
      top: 0;
      left: 0;
    }

    .emoji-2-container {
      z-index: 100;
      transform: rotate(2deg);
      position: absolute;
      bottom: 0;
      right: 0;
    }

    .content-container {
      transform: rotate(2deg);
      /* Tilts the div 15 degrees clockwise */
      width: 600px;
      height: 500px;
      background-color: rgb(239, 236, 236);
      display: flex;
      flex-direction: column;
      align-items: center;
      /* horizontal center */
    }

    h1 {
      vertical-align: middle;
    }
  </style>

</head>

<body>
  <main>
    <div class="outer-container">
      <div class="emoji-1-container">
        <img src="emoji-1.png">

      </div>
      <div class="content-container">
        <h1>REMINDER!</h1>
        <div class="notes-container">



        </div>



      </div>
      <div class="emoji-2-container">
        <img src="emoji-2.png">
      </div>


    </div>


  </main>
  <div>
    <input class="user-input" type="text" placeholder="Enter the note">
  </div>


</body>

</html>
