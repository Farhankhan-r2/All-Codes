<!doctype html>
<html>

<head>
  <title>Rock paper scissors game</title>
  <link rel="stylesheet" href="styles\rock-paper-scissors.css">
</head>

<body>
  <main>
    <header>Rock Paper Scissors</header>
    <div>
      <button class="Rock-button"><img class="rock-img" src="Rock-emoji.png"></button>
      <button class="Paper-button"><img class="paper-img" src="Paper-emoji.png"></button>
      <button class="Scissors-button"><img class="scissors-img" src="Scissors-emoji.png"></button>
    </div>
    <p class="js-result">You WIN</p>
    <p class="js-moves"></p>
    <p class="js-score"></p>
    <button class="reset-button" onclick="
        record.wins = 0;
        record.loses = 0;
        record.ties = 0;
        localStorage.removeItem('record');
        updateScoreElement();
      ">
      Reset score
    </button>

    <button class=" auto-play-button">
      Auto Play
    </button>
  </main>

  <script>
    let record = JSON.parse(localStorage.getItem("record")) || {
      wins: 0,
      loses: 0,
      ties: 0,
    };

    updateScoreElement();
    function updateScoreElement() {
      document.querySelector(".js-score").innerHTML =
        `wins:${record.wins}  loses:${record.loses}  ties:${record.ties}`;
    }

    function generateRandomMove() {
      const randomNumber = Math.random();
      let computerMove = "";
      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computerMove = "Rock";
      } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computerMove = "Paper";
      } else if (randomNumber >= 2 / 3 && randomNumber <= 1) {
        computerMove = "Scissors";
      }
      return computerMove;
    }

    function winOrlose(userMove) {
      const computerMove = generateRandomMove();

      let result = "";
      if (userMove === "Rock") {
        if (computerMove === "Rock") {
          result = "TIE";
        } else if (computerMove === "Paper") {
          result = "YOU-LOSE";
        } else if (computerMove === "Scissors") {
          result = "YOU-WIN";
        }
      } else if (userMove === "Paper") {
        if (computerMove === "Rock") {
          result = "YOU-WIN";
        } else if (computerMove === "Paper") {
          result = "TIE";
        } else if (computerMove === "Scissors") {
          result = "YOU-LOSE";
        }
      } else if (userMove === "Scissors") {
        if (computerMove === "Rock") {
          result = "YOU-LOSE";
        } else if (computerMove === "Paper") {
          result = "YOU-WIN";
        } else if (computerMove === "Scissors") {
          result = "TIE";
        }
      }
      if (result === "YOU-WIN") {
        record.wins++;
      } else if (result === "YOU-LOSE") {
        record.loses++;
      } else if (result === "TIE") {
        record.ties++;
      }
      localStorage.setItem("record", JSON.stringify(record));

      updateScoreElement();

      document.querySelector(".js-moves").innerHTML =
        `You <img class="paper-img" src="${userMove}-emoji.png"> 
        <img class="rock-img" src="${computerMove}-emoji.png">
      Computer `;
      document.querySelector(".js-result").innerHTML = `${result}`;
    }
    document.querySelector('.Rock-button').addEventListener('click', () => { winOrlose('Rock') });
    document.querySelector('.Paper-button').addEventListener('click', () => { winOrlose('Paper') });
    document.querySelector('.Scissors-button').addEventListener('click', () => { winOrlose('Scissors') });

    document.body.addEventListener('keydown', (event) => {
      if (event.key === 'r') { winOrlose('Rock') }
      else if (event.key === 'p') { winOrlose('Paper') }
      else if (event.key === 's') { winOrlose('Scissors') }
    });



    // better solution







    //solution i came up with thinking by changing classes we can do it but now it became  hastle long code
    let intervalId;
    const button1 = document.querySelector('.auto-play-button')
    button1.onclick = () => {
      //why u make the function for userMove u just created the same function as 
      //computerMove , u should just use tht function in ur code insted of rewin=rint 
      // forgot the whole meaning of function


      if (button1.classList.contains('auto-play-button')) {
        button1.classList.add("stop-play-button");
        button1.classList.remove("auto-play-button");
        button1.innerText = "Stop Play";

        intervalId = setInterval(() => {
          winOrlose(generateRandomMove())
        }, 2000);

      }
      else {
        button1.innerText = "Auto Play";
        button1.classList.add('auto-play-button');
        button1.classList.remove("stop-play-button");
        clearInterval(intervalId);
      }


    }

  </script>
</body>

</html>
