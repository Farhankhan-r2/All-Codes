    function findIndex(array1, word) {
      for (let i = 0; i < array1.length; i++) {
        if (array1[i] === word) {
          return i;
        }
      }
      return -1;
    }
    function unique(array) {
      let uniqueArray = [];
      //If the word is NOT found in uniqueArray thats the condition
      for (let i = 0; i < array.length; i++) {
        if (findIndex(uniqueArray, array[i]) === -1) {
          uniqueArray.push(array[i]);
        }
      }

      console.log(uniqueArray);
    }

    unique(['hey', 'wassup', 'conjuring', 'wassup']);
