<!DOCTYPE html>
<html>
  <head>
    <title>buttons</title>
    <style>
      .buttons-container {
        display: flex;
        flex-direction: row;

        align-items: center;
        width: 200px;
      }
      .addtocart-button {
        border: 1px solid black;
        border-radius: 8px;
        padding: 5px 4px 5px 4px;
        background-color: rgb(243, 243, 77);
        color: black;
        font-family: arial;
        margin-right: 5px;
        cursor: pointer;
      }
      .buynow-button {
        border: 1px solid black;
        border-radius: 8px;
        font-family: arial;
        background-color: rgb(237, 173, 53);
        color: black;
        padding: 5px 4px 5px 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="buttons-container">
        <button onclick=" alert('Welcome');" class="addtocart-button">
          Add to Cart
        </button>
        <button onclick=" alert('Welcome');" class="buynow-button">
          Buy now
        </button>
      </div>
    </main>
    <script></script>
  </body>
</html>
