<!DOCTYPE html>
<hmtl>
  <head> </head>
  <body>
    <script>
      function convertLength(length, from, to) {
        let result = "";
        if (from === "km" && to === "miles") {
          result = `The conversion from km to miles is ${length / 1.6} ${to}`;
        } else if (from === "km" && to === "ft") {
          result = `The conversion from km to ft is ${length * 3281} ${to}`;
        } else if (from === "miles" && to === "km") {
          result = `The conversion from miles to km is ${length * 1.6} ${to}`;
        } else if (from === "miles" && to === "ft") {
          result = `The conversion from miles to ft is ${length * 5280} ${to}`;
        } else if (from === "ft" && to === "km") {
          result = `The conversion from ft to km is ${length / 3281} ${to}`;
        } else if (from === "ft" && to === "miles") {
          result = `The conversion from ft ro miles is ${length / 5280} ${to}`;
        } else if (
          (from === "km" && to === "km") ||
          (from === "miles" && to === "miles") ||
          (from === "feet" && to === "feet")
        ) {
          result = `${length}${to}`;
        } else if (to !== "km" && to !== "miles" && to !== "ft") {
          result = `Invalid unit : ${to}`;
        } else if (from !== "km" && from !== "miles" && from !== "ft") {
          result = `Invalid unit : ${from}`;
        }
        return result;
      }
      console.log(convertLength(50, "miles", "km"));
      console.log(convertLength(32, "km", "miles"));
      console.log(convertLength(50, "km", "km"));
      console.log(convertLength(5, "miles", "km"));
      console.log(convertLength(5, "miles", "ft"));
      console.log(convertLength(5, "km", "ft"));
      console.log(convertLength(50, "lbs", "lbs"));
    </script>
  </body>
</hmtl>
