<!DOCTYPE html>
<html>
  <head> </head>
  <body>
    <p>Cart quantity</p>
    <div>
      <button
        onclick="
        runOrNot() ;
        "
      >
        Cart Quantity
      </button>
      <button
        onclick="
         cartQuantity = addItems(1);
         runOrNot() ;
        "
      >
        Add To Cart
      </button>
      <button
        onclick="
         cartQuantity = addItems(2);
         runOrNot() ;
        "
      >
        +2
      </button>
      <button
        onclick="
         cartQuantity = addItems(3);
         runOrNot() ;
        "
      >
        +3
      </button>
      <button
        onclick="
         cartQuantity = addItems(4);
         runOrNot() ;
        "
      >
        +4
      </button>
      <button
        onclick="
         cartQuantity = addItems(5);
         runOrNot() ;
        "
      >
        +5
      </button>
      <button
        onclick="
         cartQuantity = 0;
         runOrNot() ;
        "
      >
        Reset Cart
      </button>
    </div>
    <script>
      let cartQuantity = 0;
      function addItems(quantity) {
        cartQuantity = cartQuantity + quantity;
        return cartQuantity;
      }

      // SEE THIS HERE I DONT USE ELSE TO MINIMISE NESTING WITH THE HELP OF FUNCTION . THIS IS THE BEST PRACTICE... it takes less computing
      function runOrNot() {
        if (cartQuantity > 10) {
          alert(`The Cart is full`);
        }
        {
          console.log(`Cart quantity: ${cartQuantity}`);
        }
      }
    </script>
  </body>
</html>
