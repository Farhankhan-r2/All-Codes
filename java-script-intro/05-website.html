<!DOCTYPE html>
<html>
  <head>
    <title>Variables</title>
  </head>
  <body>
    <script>
      let variable1 = 3;
      console.log(variable1);

      const calculation = 2 + 2;
      console.log(calculation);
      console.log(calculation + 2);

      const message = "string";
      console.log(message);
      console.log(";");

      //reassigning the value of existing variable
      variable1 = 5;
      console.log(variable1);
      /*
      we can reassign value as many time as we want
      */
      variable1 = variable1 + 5;
      console.log(variable1);
    </script>
  </body>
</html>
