 querySelector() selects only the first matching element in the document.
 That’s why only the first button was changing before.
 this)refers to the exact button that was clicked.
 When we pass this inside onclick, the clicked button is sent into the function.
 Inside the function, we use:
 classList.contains() → checks if the class exists.
 classList.add() → adds the class.
 classList.remove() → removes the class.
